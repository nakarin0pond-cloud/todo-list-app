<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>PlanFlow — Smart Calendar Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@400;500;600;700&family=Cabinet+Grotesk:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css"/>
</head>
<body>
<canvas id="bgCanvas"></canvas>

<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon">P</div>
      <span class="brand-name">PlanFlow</span>
    </div>

    <!-- Mini Calendar Nav -->
    <div class="mini-nav">
      <button class="mini-arrow" id="prevMonth">‹</button>
      <span class="mini-title" id="miniTitle"></span>
      <button class="mini-arrow" id="nextMonth">›</button>
    </div>

    <!-- ADD EVENT FORM -->
    <div class="add-section">
      <h3 class="section-label">New Event</h3>
      <div class="form-group">
        <label>Title</label>
        <input id="evTitle" type="text" placeholder="e.g. Study JavaScript..." />
      </div>
      <div class="form-group">
        <label>Category</label>
        <select id="evCategory">
          <option value="study">📚 Study</option>
          <option value="work">💼 Work</option>
          <option value="meet">🤝 Meeting</option>
          <option value="health">💪 Health</option>
          <option value="personal">✨ Personal</option>
          <option value="deadline">🔥 Deadline</option>
        </select>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Start Date</label>
          <input id="evStart" type="date"/>
        </div>
        <div class="form-group">
          <label>End Date</label>
          <input id="evEnd" type="date"/>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Start Time</label>
          <input id="evStartTime" type="time" value="09:00"/>
        </div>
        <div class="form-group">
          <label>End Time</label>
          <input id="evEndTime" type="time" value="10:00"/>
        </div>
      </div>
      <div class="form-group">
        <label>Note (optional)</label>
        <textarea id="evNote" placeholder="Details, goals, links..."></textarea>
      </div>
      <button class="add-btn" id="addEventBtn">
        <span>+ Add Event</span>
      </button>
    </div>

    <!-- Upcoming Events -->
    <div class="upcoming-section">
      <h3 class="section-label">Upcoming</h3>
      <div id="upcomingList" class="upcoming-list"></div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">

    <!-- TOP BAR -->
    <div class="topbar">
      <div class="topbar-left">
        <button class="topbar-btn" id="sidebarToggle" title="Toggle sidebar">☰</button>
        <div class="view-tabs">
          <button class="view-tab active" data-view="month">Month</button>
          <button class="view-tab" data-view="week">Week</button>
          <button class="view-tab" data-view="day">Day</button>
        </div>
      </div>
      <div class="topbar-center">
        <button class="nav-btn" id="mainPrev">‹</button>
        <h2 class="main-title" id="mainTitle"></h2>
        <button class="nav-btn" id="mainNext">›</button>
        <button class="today-btn" id="todayBtn">Today</button>
      </div>
      <div class="topbar-right">
        <div class="legend">
          <span class="legend-dot study"></span>Study
          <span class="legend-dot work"></span>Work
          <span class="legend-dot meet"></span>Meet
          <span class="legend-dot health"></span>Health
          <span class="legend-dot personal"></span>Personal
          <span class="legend-dot deadline"></span>Deadline
        </div>
      </div>
    </div>

    <!-- MONTH VIEW -->
    <div class="view-container" id="viewMonth">
      <div class="cal-header" id="calHeader"></div>
      <div class="cal-grid" id="calGrid"></div>
    </div>

    <!-- WEEK VIEW -->
    <div class="view-container hidden" id="viewWeek">
      <div class="week-grid" id="weekGrid"></div>
    </div>

    <!-- DAY VIEW -->
    <div class="view-container hidden" id="viewDay">
      <div class="day-view" id="dayView"></div>
    </div>

  </main>
</div>

<!-- EVENT DETAIL MODAL -->
<div class="modal-overlay hidden" id="detailModal">
  <div class="modal-card" id="detailCard">
    <button class="modal-close" id="detailClose">×</button>
    <div class="detail-cat-stripe" id="detailStripe"></div>
    <div class="detail-body">
      <div class="detail-icon" id="detailIcon"></div>
      <h2 id="detailTitle"></h2>
      <div class="detail-meta" id="detailMeta"></div>
      <p class="detail-note" id="detailNote"></p>
      <button class="delete-event-btn" id="deleteEventBtn">Delete Event</button>
    </div>
  </div>
</div>

<!-- DAY CLICK MODAL -->
<div class="modal-overlay hidden" id="dayModal">
  <div class="modal-card day-modal-card">
    <button class="modal-close" id="dayModalClose">×</button>
    <h3 id="dayModalTitle"></h3>
    <div id="dayModalEvents"></div>
    <button class="add-btn mini-add" id="dayModalAdd">+ Quick Add</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
