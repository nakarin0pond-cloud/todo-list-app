<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>PlanFlow — Calendar Planner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<canvas id="bgCanvas"></canvas>

<div class="app" id="app">

  <!-- ═══════════ SIDEBAR ═══════════ -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-inner">

      <div class="brand">
        <div class="brand-mark">P</div>
        <span class="brand-name">PlanFlow</span>
        <button class="sidebar-close" id="sidebarClose" title="Close">×</button>
      </div>

      <!-- ADD FORM -->
      <section class="form-section">
        <h3 class="section-title">New Event</h3>

        <div class="field">
          <label for="fTitle">Title</label>
          <input id="fTitle" type="text" placeholder="e.g. Morning Workout…" autocomplete="off"/>
        </div>

        <!-- Category: preset pills + custom input -->
        <div class="field">
          <label>Category</label>
          <div class="cat-pills" id="catPills">
            <button class="cat-pill active" data-cat="study">📚 Study</button>
            <button class="cat-pill" data-cat="work">💼 Work</button>
            <button class="cat-pill" data-cat="meet">🤝 Meeting</button>
            <button class="cat-pill" data-cat="health">💪 Health</button>
            <button class="cat-pill" data-cat="personal">✨ Personal</button>
            <button class="cat-pill" data-cat="deadline">🔥 Deadline</button>
            <button class="cat-pill cat-custom-toggle" id="customCatToggle" data-cat="">＋ Custom</button>
          </div>
          <div class="custom-cat-wrap hidden" id="customCatWrap">
            <input id="customCatInput" type="text" placeholder="e.g. 🎸 Music Practice"/>
            <p class="field-hint">Type any emoji + label you want</p>
          </div>
        </div>

        <div class="field-row">
          <div class="field">
            <label for="fStart">Start Date</label>
            <input id="fStart" type="date"/>
          </div>
          <div class="field">
            <label for="fEnd">End Date</label>
            <input id="fEnd" type="date"/>
            <p class="field-hint">Same as start = single day</p>
          </div>
        </div>

        <div class="field-row">
          <div class="field">
            <label for="fSTime">Start Time</label>
            <input id="fSTime" type="time" value="09:00"/>
          </div>
          <div class="field">
            <label for="fETime">End Time</label>
            <input id="fETime" type="time" value="10:00"/>
          </div>
        </div>

        <div class="field">
          <label for="fNote">Note</label>
          <textarea id="fNote" placeholder="Goals, links, details…"></textarea>
        </div>

        <button class="btn-add" id="addBtn">
          <span class="btn-add-icon">+</span>
          <span>Add Event</span>
        </button>
      </section>

      <!-- UPCOMING -->
      <section class="upcoming-section">
        <h3 class="section-title">Upcoming</h3>
        <div id="upcomingList" class="upcoming-list"></div>
      </section>

    </div>
  </aside>

  <!-- ═══════════ MAIN ═══════════ -->
  <main class="main">

    <!-- TOPBAR -->
    <div class="topbar">
      <div class="topbar-left">
        <button class="btn-icon" id="sidebarToggle" title="Toggle sidebar" aria-label="Toggle sidebar">
          <svg width="16" height="16" fill="none" viewBox="0 0 16 16"><rect x="1" y="3.5" width="14" height="1.5" rx=".75" fill="currentColor"/><rect x="1" y="7.25" width="14" height="1.5" rx=".75" fill="currentColor"/><rect x="1" y="11" width="14" height="1.5" rx=".75" fill="currentColor"/></svg>
        </button>
        <div class="view-tabs" role="tablist">
          <button class="view-tab active" data-view="month" role="tab">Month</button>
          <button class="view-tab" data-view="week" role="tab">Week</button>
          <button class="view-tab" data-view="day" role="tab">Day</button>
        </div>
      </div>

      <div class="topbar-center">
        <button class="btn-nav" id="prevBtn" aria-label="Previous">&#8249;</button>
        <h2 class="cal-title" id="calTitle"></h2>
        <button class="btn-nav" id="nextBtn" aria-label="Next">&#8250;</button>
        <button class="btn-today" id="todayBtn">Today</button>
      </div>

      <div class="topbar-right">
        <div class="legend" id="legend">
          <!-- Populated by JS -->
        </div>
      </div>
    </div>

    <!-- VIEWS -->
    <div class="view-wrap">

      <!-- Month -->
      <div class="view" id="vMonth">
        <div class="dow-bar" id="dowBar"></div>
        <div class="month-grid" id="monthGrid"></div>
      </div>

      <!-- Week -->
      <div class="view hidden" id="vWeek">
        <div class="time-grid">
          <div class="time-gutter" id="wGutter"></div>
          <div class="time-cols" id="weekCols"></div>
        </div>
      </div>

      <!-- Day -->
      <div class="view hidden" id="vDay">
        <div class="day-banner" id="dayBanner"></div>
        <div class="time-grid">
          <div class="time-gutter" id="dGutter"></div>
          <div class="day-col-wrap" id="dayCols"></div>
        </div>
      </div>

    </div>
  </main>
</div>

<!-- DETAIL MODAL -->
<div class="overlay hidden" id="detailOv" role="dialog" aria-modal="true">
  <div class="modal detail-modal" id="detailModal">
    <div class="modal-accent" id="modalAccent"></div>
    <button class="modal-close" id="detailClose" aria-label="Close">×</button>
    <div class="modal-body">
      <div class="modal-cat-icon" id="dIcon"></div>
      <h2 class="modal-title" id="dTitle"></h2>
      <ul class="modal-meta" id="dMeta"></ul>
      <p class="modal-note" id="dNote"></p>
      <div class="modal-footer">
        <button class="btn-delete" id="delBtn">Delete Event</button>
      </div>
    </div>
  </div>
</div>

<!-- DAY POPUP MODAL -->
<div class="overlay hidden" id="dayPopOv" role="dialog" aria-modal="true">
  <div class="modal day-popup">
    <button class="modal-close" id="dayPopClose" aria-label="Close">×</button>
    <div class="modal-body">
      <h3 class="modal-title" id="dayPopTitle"></h3>
      <div id="dayPopList" class="day-pop-list"></div>
      <button class="btn-quick-add" id="quickAddBtn">+ Add event on this day</button>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
